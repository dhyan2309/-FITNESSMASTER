{% extends 'base.html' %}
{% block title %}{{ action }} Product — Admin{% endblock %}
{% block content %}
<div class="dash-page">

  <div class="dash-top">
    <div class="dash-welcome">
      <h1>{{ action|upper }} PRODUCT</h1>
    </div>
    <a href="{% url 'admin_product_list' %}" class="btn btn-outline"
       style="padding:9px 20px;font-size:13px;">← Back</a>
  </div>

  <div class="d-card" style="max-width:600px;">
    <form method="POST" enctype="multipart/form-data"
          style="display:flex;flex-direction:column;gap:18px;">
      {% csrf_token %}

      <div>
        <label style="font-size:12px;font-weight:700;color:#888;letter-spacing:1px;
                      text-transform:uppercase;display:block;margin-bottom:6px;">Product Name *</label>
        <input type="text" name="product_name" required
               value="{{ product.product_name|default:'' }}"
               style="width:100%;background:#1e1e2e;border:1px solid #2d2d3d;border-radius:10px;
                      padding:12px 16px;color:#e2e8f0;font-size:14px;outline:none;box-sizing:border-box;">
      </div>

      <div>
        <label style="font-size:12px;font-weight:700;color:#888;letter-spacing:1px;
                      text-transform:uppercase;display:block;margin-bottom:6px;">Description *</label>
        <textarea name="description" rows="3" required
                  style="width:100%;background:#1e1e2e;border:1px solid #2d2d3d;border-radius:10px;
                         padding:12px 16px;color:#e2e8f0;font-size:14px;outline:none;
                         resize:vertical;box-sizing:border-box;">{{ product.description|default:'' }}</textarea>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div>
          <label style="font-size:12px;font-weight:700;color:#888;letter-spacing:1px;
                        text-transform:uppercase;display:block;margin-bottom:6px;">Price (INR) *</label>
          <input type="number" name="price" step="0.01" min="0" required
                 value="{{ product.price|default:'' }}"
                 style="width:100%;background:#1e1e2e;border:1px solid #2d2d3d;border-radius:10px;
                        padding:12px 16px;color:#e2e8f0;font-size:14px;outline:none;box-sizing:border-box;">
        </div>
        <div>
          <label style="font-size:12px;font-weight:700;color:#888;letter-spacing:1px;
                        text-transform:uppercase;display:block;margin-bottom:6px;">Stock *</label>
          <input type="number" name="stock" min="0" required
                 value="{{ product.stock|default:'' }}"
                 style="width:100%;background:#1e1e2e;border:1px solid #2d2d3d;border-radius:10px;
                        padding:12px 16px;color:#e2e8f0;font-size:14px;outline:none;box-sizing:border-box;">
        </div>
      </div>

      <div>
        <label style="font-size:12px;font-weight:700;color:#888;letter-spacing:1px;
                      text-transform:uppercase;display:block;margin-bottom:6px;">Product Image</label>
        {% if product.image %}
          <div style="margin-bottom:8px;">
            <img src="{{ product.image.url }}" style="height:80px;border-radius:8px;">
            <div style="font-size:12px;color:#888;margin-top:4px;">Current image. Upload new to replace.</div>
          </div>
        {% endif %}
        <input type="file" name="image" accept="image/*"
               style="width:100%;background:#1e1e2e;border:1px solid #2d2d3d;border-radius:10px;
                      padding:12px 16px;color:#e2e8f0;font-size:14px;box-sizing:border-box;">
      </div>

      <button type="submit" class="btn btn-purple"
              style="padding:13px;font-size:14px;font-weight:700;
                     border:none;cursor:pointer;border-radius:10px;">
        💾 {{ action }} Product
      </button>

    </form>
  </div>

</div>
{% endblock %}
