{% extends 'base.html' %}
{% block title %}{{ action }} Equipment — Admin{% endblock %}
{% block content %}
<div class="dash-page">

  <div class="dash-top">
    <div class="dash-welcome">
      <h1>{{ action|upper }} EQUIPMENT</h1>
    </div>
    <a href="{% url 'equipment_list' %}" class="btn btn-outline"
       style="padding:9px 20px;font-size:13px;">← Back</a>
  </div>

  <div class="d-card" style="max-width:600px;">
    <form method="POST"
          style="display:flex;flex-direction:column;gap:18px;">
      {% csrf_token %}

      <div>
        <label style="font-size:12px;font-weight:700;color:#888;letter-spacing:1px;
                      text-transform:uppercase;display:block;margin-bottom:6px;">Name *</label>
        <input type="text" name="name" required
               value="{{ item.name|default:'' }}"
               style="width:100%;background:#1e1e2e;border:1px solid #2d2d3d;border-radius:10px;
                      padding:12px 16px;color:#e2e8f0;font-size:14px;outline:none;box-sizing:border-box;">
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div>
          <label style="font-size:12px;font-weight:700;color:#888;letter-spacing:1px;
                        text-transform:uppercase;display:block;margin-bottom:6px;">Category *</label>
          <select name="category" required
                  style="width:100%;background:#1e1e2e;border:1px solid #2d2d3d;border-radius:10px;
                         padding:12px 16px;color:#e2e8f0;font-size:14px;outline:none;box-sizing:border-box;">
            <option value="" disabled {% if not item %}selected{% endif %}>Select</option>
            <option value="Cardio" {% if item.category == 'Cardio' %}selected{% endif %}>Cardio</option>
            <option value="Strength" {% if item.category == 'Strength' %}selected{% endif %}>Strength</option>
            <option value="Free Weights" {% if item.category == 'Free Weights' %}selected{% endif %}>Free Weights</option>
            <option value="Functional" {% if item.category == 'Functional' %}selected{% endif %}>Functional</option>
            <option value="Other" {% if item.category == 'Other' %}selected{% endif %}>Other</option>
          </select>
        </div>
        <div>
          <label style="font-size:12px;font-weight:700;color:#888;letter-spacing:1px;
                        text-transform:uppercase;display:block;margin-bottom:6px;">Quantity *</label>
          <input type="number" name="quantity" min="1" required
                 value="{{ item.quantity|default:'1' }}"
                 style="width:100%;background:#1e1e2e;border:1px solid #2d2d3d;border-radius:10px;
                        padding:12px 16px;color:#e2e8f0;font-size:14px;outline:none;box-sizing:border-box;">
        </div>
      </div>

      <div>
        <label style="font-size:12px;font-weight:700;color:#888;letter-spacing:1px;
                      text-transform:uppercase;display:block;margin-bottom:6px;">Status</label>
        <select name="status"
                style="width:100%;background:#1e1e2e;border:1px solid #2d2d3d;border-radius:10px;
                       padding:12px 16px;color:#e2e8f0;font-size:14px;outline:none;box-sizing:border-box;">
          <option value="Working" {% if item.status == 'Working' %}selected{% endif %}>Working</option>
          <option value="Under Maintenance" {% if item.status == 'Under Maintenance' %}selected{% endif %}>Under Maintenance</option>
          <option value="Out of Order" {% if item.status == 'Out of Order' %}selected{% endif %}>Out of Order</option>
        </select>
      </div>

      <div>
        <label style="font-size:12px;font-weight:700;color:#888;letter-spacing:1px;
                      text-transform:uppercase;display:block;margin-bottom:6px;">Description</label>
        <textarea name="description" rows="3"
                  style="width:100%;background:#1e1e2e;border:1px solid #2d2d3d;border-radius:10px;
                         padding:12px 16px;color:#e2e8f0;font-size:14px;outline:none;
                         resize:vertical;box-sizing:border-box;">{{ item.description|default:'' }}</textarea>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div>
          <label style="font-size:12px;font-weight:700;color:#888;letter-spacing:1px;
                        text-transform:uppercase;display:block;margin-bottom:6px;">Purchase Date</label>
          <input type="date" name="purchase_date"
                 value="{{ item.purchase_date|default:'' }}"
                 style="width:100%;background:#1e1e2e;border:1px solid #2d2d3d;border-radius:10px;
                        padding:12px 16px;color:#e2e8f0;font-size:14px;outline:none;box-sizing:border-box;">
        </div>
        <div>
          <label style="font-size:12px;font-weight:700;color:#888;letter-spacing:1px;
                        text-transform:uppercase;display:block;margin-bottom:6px;">Last Maintenance</label>
          <input type="date" name="last_maintenance"
                 value="{{ item.last_maintenance|default:'' }}"
                 style="width:100%;background:#1e1e2e;border:1px solid #2d2d3d;border-radius:10px;
                        padding:12px 16px;color:#e2e8f0;font-size:14px;outline:none;box-sizing:border-box;">
        </div>
      </div>

      <button type="submit" class="btn btn-purple"
              style="padding:13px;font-size:14px;font-weight:700;
                     border:none;cursor:pointer;border-radius:10px;">
        💾 {{ action }} Equipment
      </button>

    </form>
  </div>

</div>
{% endblock %}
