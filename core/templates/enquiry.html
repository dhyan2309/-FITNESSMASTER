{% extends 'base.html' %}
{% load i18n %}
{% block title %}{% trans "Enquiry" %} — FitnessMaster{% endblock %}
{% block content %}
<div class="dash-page" style="max-width:600px;margin:0 auto;padding-top:40px;">

  <div class="dash-welcome" style="text-align:center;margin-bottom:28px;">
    <h1>{% trans "GET IN TOUCH" %}</h1>
    <p style="color:#888;">{% trans "Have a question? Send us an enquiry and we'll get back to you." %}</p>
  </div>

  <div class="d-card">
    <form method="POST" style="display:flex;flex-direction:column;gap:18px;">
      {% csrf_token %}

      <div>
        <label style="font-size:12px;font-weight:700;color:#888;letter-spacing:1px;
                      text-transform:uppercase;display:block;margin-bottom:6px;">{% trans "Full Name" %} *</label>
        <input type="text" name="full_name" required
               style="width:100%;background:#1e1e2e;border:1px solid #2d2d3d;border-radius:10px;
                      padding:12px 16px;color:#e2e8f0;font-size:14px;outline:none;box-sizing:border-box;">
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div>
          <label style="font-size:12px;font-weight:700;color:#888;letter-spacing:1px;
                        text-transform:uppercase;display:block;margin-bottom:6px;">{% trans "Email" %} *</label>
          <input type="email" name="email" required
                 style="width:100%;background:#1e1e2e;border:1px solid #2d2d3d;border-radius:10px;
                        padding:12px 16px;color:#e2e8f0;font-size:14px;outline:none;box-sizing:border-box;">
        </div>
        <div>
          <label style="font-size:12px;font-weight:700;color:#888;letter-spacing:1px;
                        text-transform:uppercase;display:block;margin-bottom:6px;">{% trans "Phone" %} *</label>
          <input type="text" name="phone" required
                 style="width:100%;background:#1e1e2e;border:1px solid #2d2d3d;border-radius:10px;
                        padding:12px 16px;color:#e2e8f0;font-size:14px;outline:none;box-sizing:border-box;">
        </div>

      <div>
        <label style="font-size:12px;font-weight:700;color:#888;letter-spacing:1px;
                      text-transform:uppercase;display:block;margin-bottom:6px;">{% trans "Message" %} *</label>
        <textarea name="message" rows="4" required
                  style="width:100%;background:#1e1e2e;border:1px solid #2d2d3d;border-radius:10px;
                         padding:12px 16px;color:#e2e8f0;font-size:14px;outline:none;
                         resize:vertical;box-sizing:border-box;"></textarea>
      </div>

      <button type="submit" class="btn btn-purple"
              style="padding:13px;font-size:14px;font-weight:700;
                     border:none;cursor:pointer;border-radius:10px;">
        📨 {% trans "Submit Enquiry" %}
      </button>

    </form>
  </div>
{% endblock %}
